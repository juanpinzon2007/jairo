services:
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"

  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_service
      POSTGRES_PASSWORD: catalog_service
    ports:
      - "5434:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data

  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_service
      POSTGRES_PASSWORD: inventory_service
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data

  report-db:
    image: postgres:16-alpine
    container_name: report-db
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: report_service
      POSTGRES_PASSWORD: report_service
    ports:
      - "5436:5432"
    volumes:
      - report-db-data:/var/lib/postgresql/data

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    depends_on:
      - discovery-server
      - user-db
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: user_service
      SPRING_DATASOURCE_PASSWORD: user_service
      SECURITY_JWT_SECRET: inventory-secret-key-insecure-change-me-2026

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: catalog-service
    depends_on:
      - discovery-server
      - catalog-db
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/catalog_db
      SPRING_DATASOURCE_USERNAME: catalog_service
      SPRING_DATASOURCE_PASSWORD: catalog_service
      SECURITY_JWT_SECRET: inventory-secret-key-insecure-change-me-2026

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    depends_on:
      - discovery-server
      - inventory-db
      - catalog-service
      - kafka
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: inventory_service
      SPRING_DATASOURCE_PASSWORD: inventory_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECURITY_JWT_SECRET: inventory-secret-key-insecure-change-me-2026

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: report-service
    depends_on:
      - discovery-server
      - report-db
      - catalog-service
      - inventory-service
      - kafka
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://report-db:5432/report_db
      SPRING_DATASOURCE_USERNAME: report_service
      SPRING_DATASOURCE_PASSWORD: report_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECURITY_JWT_SECRET: inventory-secret-key-insecure-change-me-2026

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      - discovery-server
      - user-service
      - catalog-service
      - inventory-service
      - report-service
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka

volumes:
  user-db-data:
  catalog-db-data:
  inventory-db-data:
  report-db-data:
