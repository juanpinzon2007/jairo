server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
