server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: inventory-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/inventory_db}
    username: ${SPRING_DATASOURCE_USERNAME:inventory_service}
    password: ${SPRING_DATASOURCE_PASSWORD:inventory_service}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring:
        json:
          add:
            type:
              headers: false
      security.protocol: ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:}
      sasl.jaas.config: ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:inventory-secret-key-insecure-change-me-2026}
    access-token-minutes: ${SECURITY_JWT_ACCESS_TOKEN_MINUTES:240}
    issuer: ${SECURITY_JWT_ISSUER:inventory-platform}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

clients:
  catalog:
    url: ${CLIENTS_CATALOG_URL:http://catalog-service:8082}

app:
  kafka:
    topics:
      inventory-movements: ${APP_KAFKA_TOPIC_INVENTORY_MOVEMENTS:inventory.movements}

management:
  endpoints:
    web:
      exposure:
        include: health,info
